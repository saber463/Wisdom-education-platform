## 三、GitHub Actions 配置

### 3.1 主配置文件

```yaml
# .github/workflows/ci-cd.yml
name: ErrorCN CI/CD Pipeline

on:
  push:
    branches: [main, develop, release/*, hotfix/*]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [main, develop]
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境 (dev/staging/prod)'
        required: true
        default: 'dev'
      skip_tests:
        description: '跳过测试 (true/false)'
        required: false
        default: 'false'

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  ERROR_CN_VERSION: ${{ github.run_id }}-${{ github.sha }}

jobs:
  # 第一阶段：代码质量检查
  quality-check:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: core/package-lock.json

      - name: 安装依赖
        working-directory: ./core
        run: |
          npm ci
          npm run install:all

      - name: ESLint 检查
        working-directory: ./core
        run: npm run lint
        continue-on-error: true

      - name: TypeScript 编译检查
        working-directory: ./core
        run: npm run typecheck

      - name: 生成代码质量报告
        uses: github/codeql-action/analyze@v2
        with:
          category: '/language:typescript'
          query-packed: security-extended

      - name: 上传质量报告
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: core/reports/

    outputs:
      lint_result: ${{ steps.lint.outputs.exit_code }}

  # 第二阶段：单元测试
  unit-test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: quality-check
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['18', '20', '22']
        exclude:
          - os: windows-latest
            node-version: '22'
          - os: macos-latest
            node-version: '18'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: core/package-lock.json

      - name: 安装依赖
        working-directory: ./core
        run: npm ci

      - name: 执行单元测试
        working-directory: ./core
        run: npm run test:unit -- --coverage --detectOpenHandles --forceExit

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.os }}-${{ matrix.node-version }}
          path: core/coverage/

      - name: 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-failure
          path: core/test-results/

  # 第三阶段：验收测试
  acceptance-test:
    name: 验收测试
    runs-on: ubuntu-latest
    needs: unit-test
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: core/package-lock.json

      - name: 安装依赖
        working-directory: ./core
        run: npm ci

      - name: 执行验收测试
        working-directory: ./core
        run: |
          npm run test:acceptance
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "验收测试未通过，查看报告：cat reports/acceptance-report.md"
            exit 1
          fi

      - name: 生成验收报告
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-report
          path: core/reports/acceptance/

      - name: 通知验收结果
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "ErrorCN 验收测试结果",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "验收测试 *{{ job.status }}*\n> 结果: ${{ job.status }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # 第四阶段：VS Code 插件打包
  package-vscode:
    name: 打包 VS Code 插件
    runs-on: ubuntu-latest
    needs: acceptance-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    outputs:
      vsix_file: ${{ steps.package.outputs.vsix_file }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: 安装依赖
        working-directory: ./core
        run: npm ci

      - name: 生成版本号
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 构建插件
        working-directory: ./vscode-extension
        run: |
          npm run compile
          npm run vscode:prepublish

      - name: 打包插件
        id: package
        working-directory: ./vscode-extension
        run: |
          npx vsce package \
            --packagePath error-cn-${{ steps.version.outputs.version }}.vsix \
            --no-dependency-validation
          echo "vsix_file=error-cn-${{ steps.version.outputs.version }}.vsix" >> $GITHUB_OUTPUT

      - name: 上传插件包
        uses: actions/upload-artifact@v4
        with:
          name: vsix-package
          path: vscode-extension/error-cn-*.vsix

      - name: 验证插件包
        run: |
          FILE_SIZE=$(stat -c%s vscode-extension/error-cn-${{ steps.version.outputs.version }}.vsix)
          if [ $FILE_SIZE -lt 1000000 ]; then
            echo "错误：插件包过小 (${FILE_SIZE} bytes)，可能打包失败"
            exit 1
          fi
          echo "插件包大小: $(du -h vscode-extension/error-cn-${{ steps.version.outputs.version }}.vsix | cut -f1)"

  # 第五阶段：PyCharm 插件打包
  package-idea:
    name: 打包 PyCharm 插件
    runs-on: ubuntu-latest
    needs: acceptance-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    outputs:
      jar_file: ${{ steps.package.outputs.jar_file }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: 设置 Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: wrapper

      - name: 构建插件
        working-directory: ./idea-extension
        run: ./gradlew buildPlugin

      - name: 打包插件
        id: package
        working-directory: ./idea-extension
        run: |
          ./gradlew packagePlugin
          JAR_FILE=$(find build/distributions -name "*.jar" | head -1)
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT

      - name: 上传插件包
        uses: actions/upload-artifact@v4
        with:
          name: jar-package
          path: idea-extension/build/distributions/*.jar

  # 第六阶段：发布到插件市场
  publish-marketplace:
    name: 发布到插件市场
    runs-on: ubuntu-latest
    needs: [package-vscode, package-idea]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 VS Code 插件
        uses: actions/download-artifact@v4
        with:
          name: vsix-package
          path: artifacts/

      - name: 下载 PyCharm 插件
        uses: actions/download-artifact@v4
        with:
          name: jar-package
          path: artifacts/

      - name: 发布到 VS Code 市场
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: ./vscode-extension
        run: |
          npx vsce publish \
            --packagePath ../artifacts/error-cn-*.vsix \
            --pat ${{ secrets.VSCE_PAT }}
        continue-on-error: true

      - name: 发布到 PyCharm 市场
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: ./idea-extension
        run: |
          curl -X POST \
            "https://plugins.jetbrains.com/plugin/upload" \
            -H "Authorization: Bearer ${{ secrets.JETBRAINS_TOKEN }}" \
            -F "file=@artifacts/*.jar"
        continue-on-error: true

      - name: 创建 GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.vsix
          files: artifacts/*.jar
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 第七阶段：开发环境部署
  deploy-dev:
    name: 部署到开发环境
    runs-on: ubuntu-latest
    needs: [package-vscode, package-idea]
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'dev'
    environment:
      name: development
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载插件包
        uses: actions/download-artifact@v4
        with:
          name: vsix-package
          path: artifacts/
        continue-on-error: true

      - name: 部署到开发服务器
        run: |
          echo "部署到开发环境..."
          # SCP 上传插件包到开发服务器
          scp -o StrictHostKeyChecking=no artifacts/*.vsix user@dev-server:/var/www/error-cn/
          # 发送部署通知
          curl -X POST "https://hooks.example.com/deploy" \
            -H "Content-Type: application/json" \
            -d '{"environment": "dev", "version": "${{ env.ERROR_CN_VERSION }}"}'

      - name: 验证部署
        run: |
          echo "验证开发环境部署..."
          curl -f https://dev.error-cn.example.com/health

  # 异常处理：构建失败通知
  notify-failure:
    name: 构建失败通知
    runs-on: ubuntu-latest
    needs: [quality-check, unit-test, acceptance-test]
    if: failure()
    steps:
      - name: 发送失败通知
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "ErrorCN 构建失败",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "⚠️ ErrorCN 构建失败"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*工作流:*\n${{ github.workflow }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*分支:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*失败任务:*\n${{ needs.*.result }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*提交:*\n${{ github.sha }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "查看构建"
                      },
                      "url": "${{ github.run_url }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
```

### 3.2 版本管理配置

```yaml
# .github/workflows/versioning.yml
name: 版本管理

on:
  push:
    branches: [main]
    paths:
      - 'core/src/**'
      - 'core/package.json'
  workflow_dispatch:
    inputs:
      version_type:
        description: '版本类型 (major/minor/patch)'
        required: true
        default: 'patch'

jobs:
  version-management:
    name: 版本号管理
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: 安装依赖
        working-directory: ./core
        run: npm ci

      - name: 生成语义化版本号
        id: version
        working-directory: ./core
        run: |
          VERSION=$(npm run version:bump -- ${{ github.event.inputs.version_type || 'patch' }})
          echo "new_version=$VERSION" >> $GITHUB_OUTPUT

      - name: 更新版本号
        run: |
          echo "新版本号: ${{ steps.version.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push
          git push origin "v${{ steps.version.outputs.new_version }}"

      - name: 生成更新日志
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commits } = await github.request(
              'GET /repos/{owner}/{repo}/commits',
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                since: '1d ago'
              }
            );
            
            const changelog = commits.map(c => {
              const msg = c.commit.message.split('\n')[0];
              const type = msg.match(/^[a-z]+/)?.[0] || 'other';
              return `- ${msg}`;
            }).join('\n');
            
            console.log('更新日志:\n' + changelog);
```

### 3.3 自动化验收测试配置

```yaml
# .github/workflows/acceptance.yml
name: 自动化验收测试

on:
  schedule:
    - cron: '0 0 * * 0'  # 每周日执行一次完整验收测试
  workflow_dispatch:
    inputs:
      test_suite:
        description: '测试套件 (full/quick/regression)'
        required: true
        default: 'full'

jobs:
  acceptance-test:
    name: 自动化验收测试
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_env:
          - os: ubuntu-latest
            browser: vscode
          - os: ubuntu-latest
            browser: idea
          - os: windows-latest
            browser: vscode
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Playwright
        run: npx playwright install --with-deps chromium

      - name: 执行验收测试
        run: |
          cd core
          npm run test:acceptance -- --test-suite=${{ github.event.inputs.test_suite }}

      - name: 生成验收报告
        run: |
          cd core
          npm run report:generate -- --format=markdown --output=reports/acceptance-report.md

      - name: 上传验收报告
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-report-${{ matrix.test_env.os }}-${{ matrix.test_env.browser }}
          path: core/reports/acceptance/

      - name: 发布验收结果
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: 1,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 自动化验收测试报告\n\n查看完整报告: [验收报告](docs/验收报告.md)'
            })
```

