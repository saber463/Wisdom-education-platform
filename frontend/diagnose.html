<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诊断页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .test-item {
            margin: 15px 0;
            padding: 10px;
            border-left: 4px solid #409eff;
            background: #f0f9ff;
        }
        .success {
            border-left-color: #67c23a;
            background: #f0f9ff;
        }
        .error {
            border-left-color: #f56c6c;
            background: #fef0f0;
        }
        button {
            padding: 10px 20px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #66b1ff;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 智慧教育平台诊断工具</h1>
        
        <div id="results"></div>
        
        <h2>测试操作</h2>
        <button onclick="testBackendConnection()">测试后端连接</button>
        <button onclick="testAIService()">测试AI服务</button>
        <button onclick="checkLocalStorage()">检查LocalStorage</button>
        <button onclick="window.location.reload()">刷新页面</button>
    </div>

    <script>
        const resultsDiv = document.getElementById('results');

        function addResult(title, content, isSuccess = true) {
            const div = document.createElement('div');
            div.className = `test-item ${isSuccess ? 'success' : 'error'}`;
            div.innerHTML = `<strong>${title}</strong><br>${content}`;
            resultsDiv.appendChild(div);
        }

        // 页面加载时自动运行诊断
        window.onload = function() {
            runDiagnostics();
        };

        async function runDiagnostics() {
            resultsDiv.innerHTML = '<h2>诊断结果</h2>';
            
            // 1. 检查浏览器信息
            addResult('浏览器信息', `
                User Agent: ${navigator.userAgent}<br>
                语言: ${navigator.language}<br>
                在线状态: ${navigator.onLine ? '在线' : '离线'}
            `);

            // 2. 检查当前URL
            addResult('当前URL', `
                完整URL: ${window.location.href}<br>
                协议: ${window.location.protocol}<br>
                主机: ${window.location.host}<br>
                路径: ${window.location.pathname}
            `);

            // 3. 检查后端连接
            await testBackendConnection();

            // 4. 检查LocalStorage
            checkLocalStorage();
        }

        async function testBackendConnection() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                addResult('✅ 后端连接', `
                    状态: ${response.status}<br>
                    消息: ${data.message}<br>
                    时间: ${data.timestamp}<br>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `, true);
            } catch (error) {
                addResult('❌ 后端连接失败', `
                    错误: ${error.message}<br>
                    请确保后端服务运行在 http://localhost:3000
                `, false);
            }
        }

        async function testAIService() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                const aiStatus = data.services?.ai?.status || 'unknown';
                addResult('AI服务状态', `
                    状态: ${aiStatus}<br>
                    <pre>${JSON.stringify(data.services?.ai, null, 2)}</pre>
                `, aiStatus === 'ok');
            } catch (error) {
                addResult('❌ AI服务检查失败', error.message, false);
            }
        }

        function checkLocalStorage() {
            const token = localStorage.getItem('edu_token');
            const userInfo = localStorage.getItem('edu_user_info');
            
            addResult('LocalStorage', `
                Token: ${token ? '存在' : '不存在'}<br>
                用户信息: ${userInfo ? '存在' : '不存在'}<br>
                ${userInfo ? `<pre>${userInfo}</pre>` : ''}
            `, true);
        }
    </script>
</body>
</html>
