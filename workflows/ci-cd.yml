## 二、流水线流程

### 2.1 整体流程图

```
                        ┌─────────────────┐
                        │   代码提交      │
                        │  (Push/Merge)   │
                        └────────┬────────┘
                                 ↓
                        ┌─────────────────┐
                        │   分支判断      │
                        │ (main/develop)  │
                        └────────┬────────┘
                                 ↓
              ┌──────────────────┴──────────────────┐
              ↓                                      ↓
     ┌─────────────────┐                   ┌─────────────────┐
     │   特性开发流程   │                   │   发布流程      │
     │  (feature/*)    │                   │  (main/release) │
     └────────┬────────┘                   └────────┬────────┘
              ↓                                      ↓
     ┌─────────────────┐                   ┌─────────────────┐
     │ 代码拉取与安装   │                   │ 代码拉取与安装   │
     └────────┬────────┘                   └────────┬────────┘
              ↓                                      ↓
     ┌─────────────────┐                   ┌─────────────────┐
     │ 代码检查        │                   │ 代码检查        │
     │ (ESLint/TS)     │                   │ (ESLint/TS)     │
     └────────┬────────┘                   └────────┬────────┘
              ↓                                      ↓
     ┌─────────────────┐                   ┌─────────────────┐
     │ 单元测试        │                   │ 单元测试        │
     │ (Jest)          │                   │ (Jest)          │
     └────────┬────────┘                   └────────┬────────┘
              ↓                                      ↓
     ┌─────────────────┐                   ┌─────────────────┐
     │ 预览构建        │                   │ 验收测试        │
     └────────┬────────┘                   └────────┬────────┘
              ↓                                      ↓
     ┌─────────────────┐                   ┌─────────────────┐
     │ 开发环境部署    │                   │ VS Code 插件    │
     └─────────────────┘                   │ 打包与发布      │
                                            └────────┬────────┘
                                                     ↓
                                            ┌─────────────────┐
                                            │ PyCharm 插件    │
                                            │ 打包与发布      │
                                            └────────┬────────┘
                                                     ↓
                                            ┌─────────────────┐
                                            │ GitHub Release  │
                                            │ 与市场同步      │
                                            └─────────────────┘
```

### 2.2 各阶段说明

| 阶段名称 | 执行内容 | 执行时间 | 输出产物 |
|---------|---------|---------|---------|
| 代码拉取 | 检出代码、安装依赖 | 30-60s | node_modules/ |
| 代码检查 | ESLint 校验、TypeScript 编译 | 20-40s | 质量报告 |
| 单元测试 | Jest 测试执行 | 60-120s | 测试报告 |
| 验收测试 | 自动化验收脚本执行 | 120-180s | 验收报告 |
| 插件打包 | vsce/Gradle 打包 | 60-120s | .vsix/.jar 文件 |
| 环境部署 | 开发/测试环境部署 | 30-60s | 部署记录 |
| 市场发布 | 插件市场上传 | 60-120s | 发布记录 |

