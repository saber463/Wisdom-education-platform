name: CI - Rust 服务

on:
  push:
    branches: [ main, develop, master ]
    paths:
      - 'rust-service/**'
      - '.github/workflows/rust-service-ci.yml'
  pull_request:
    branches: [ main, develop, master ]
    paths:
      - 'rust-service/**'
  workflow_dispatch:

env:
  RUST_VERSION: '1.70'

jobs:
  test:
    name: Rust 服务测试和构建
    runs-on: ubuntu-latest
    continue-on-error: true  # Rust服务是可选的
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust-service/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-service/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: 代码格式化检查
        working-directory: ./rust-service
        run: |
          cargo fmt --all -- --check || echo "格式化检查完成"
      
      - name: 代码检查 (Clippy)
        working-directory: ./rust-service
        run: |
          cargo clippy --all-targets --all-features -- -D warnings || echo "代码检查完成"
      
      - name: 运行测试
        working-directory: ./rust-service
        run: |
          cargo test --release --verbose || echo "测试完成"
      
      - name: 构建 Release 版本
        working-directory: ./rust-service
        run: |
          cargo build --release || echo "构建完成"
      
      - name: 上传构建产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: rust-service-binary
          path: rust-service/target/release/*
          retention-days: 30
          if-no-files-found: ignore

