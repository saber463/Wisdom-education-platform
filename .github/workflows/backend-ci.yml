name: CI - 后端模块

on:
  push:
    branches: [ main, develop, master ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop, master ]
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: 后端测试和构建
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: edu_education_platform_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      
      redis:
        image: redis:6-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: 安装依赖
        working-directory: ./backend
        run: npm ci
      
      - name: 安装 MySQL 客户端并初始化测试库
        env:
          MYSQL_PWD: test_password
        run: |
          sudo apt-get update -qq && sudo apt-get install -y default-mysql-client
          for i in $(seq 1 30); do mysql -h 127.0.0.1 -P 3306 -u root -e "SELECT 1" 2>/dev/null && break; sleep 2; done
          sed 's/edu_education_platform/edu_education_platform_test/g' docs/sql/schema.sql | mysql -h 127.0.0.1 -P 3306 -u root edu_education_platform_test
          sed 's/edu_education_platform/edu_education_platform_test/g' backend/sql/learning-platform-integration-tables.sql | mysql -h 127.0.0.1 -P 3306 -u root edu_education_platform_test
      
      - name: 代码检查
        working-directory: ./backend
        run: npm run lint || true
      
      - name: 运行单元测试
        working-directory: ./backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: test_password
          DB_NAME: edu_education_platform_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_key_for_ci
        run: npm run test:fast
      
      - name: 生成测试覆盖率
        working-directory: ./backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: test_password
          DB_NAME: edu_education_platform_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_key_for_ci
        run: npm run test:coverage || true
      
      - name: 生成测试报告
        if: always()
        working-directory: ./backend
        run: |
          if [ -d "coverage" ]; then
            mkdir -p test-reports
            echo "# 后端测试报告" > test-reports/TEST_REPORT.md
            echo "" >> test-reports/TEST_REPORT.md
            echo "## 测试概览" >> test-reports/TEST_REPORT.md
            echo "" >> test-reports/TEST_REPORT.md
            echo "- **报告生成时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> test-reports/TEST_REPORT.md
            echo "- **Node.js 版本**: $(node --version)" >> test-reports/TEST_REPORT.md
            echo "- **npm 版本**: $(npm --version)" >> test-reports/TEST_REPORT.md
            echo "- **测试环境**: ${{ env.NODE_ENV }}" >> test-reports/TEST_REPORT.md
            echo "" >> test-reports/TEST_REPORT.md
            echo "## 测试结果" >> test-reports/TEST_REPORT.md
            echo "" >> test-reports/TEST_REPORT.md
            if [ -f "coverage/coverage-summary.json" ]; then
              echo "### 覆盖率摘要" >> test-reports/TEST_REPORT.md
              echo "" >> test-reports/TEST_REPORT.md
              echo '\`\`\`json' >> test-reports/TEST_REPORT.md
              cat coverage/coverage-summary.json >> test-reports/TEST_REPORT.md
              echo '\`\`\`' >> test-reports/TEST_REPORT.md
              echo "" >> test-reports/TEST_REPORT.md
            fi
            if [ -f "coverage/lcov-report/index.html" ]; then
              echo "### 详细覆盖率报告" >> test-reports/TEST_REPORT.md
              echo "" >> test-reports/TEST_REPORT.md
              echo "[查看详细覆盖率报告](coverage/lcov-report/index.html)" >> test-reports/TEST_REPORT.md
              echo "" >> test-reports/TEST_REPORT.md
            fi
            if [ -f ".nyc_output/coverage.json" ]; then
              echo "### 原始覆盖率数据" >> test-reports/TEST_REPORT.md
              echo "" >> test-reports/TEST_REPORT.md
              echo '\`\`\`json' >> test-reports/TEST_REPORT.md
              cat .nyc_output/coverage.json | head -n 100 >> test-reports/TEST_REPORT.md
              echo "... (省略)" >> test-reports/TEST_REPORT.md
              echo '\`\`\`' >> test-reports/TEST_REPORT.md
              echo "" >> test-reports/TEST_REPORT.md
            fi
            echo "## 测试输出" >> test-reports/TEST_REPORT.md
            echo "" >> test-reports/TEST_REPORT.md
            echo '\`\`\`' >> test-reports/TEST_REPORT.md
            npm run test:coverage 2>&1 | tail -n 100 >> test-reports/TEST_REPORT.md || true
            echo '\`\`\`' >> test-reports/TEST_REPORT.md
            echo "" >> test-reports/TEST_REPORT.md
            echo "---" >> test-reports/TEST_REPORT.md
            echo "*此报告由 CI/CD 系统自动生成*" >> test-reports/TEST_REPORT.md
          fi
      
      - name: 构建项目
        working-directory: ./backend
        run: npm run build
      
      - name: 上传构建产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 30
      
      - name: 上传测试覆盖率
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          retention-days: 30
          if-no-files-found: ignore
      
      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/test-reports/
          retention-days: 90
          if-no-files-found: ignore

