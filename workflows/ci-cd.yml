## 五、使用说明

### 5.1 本地调试

在本地环境中调试流水线配置：

```bash
# 1. 安装 GitHub Actions CLI
npm install -g @actions/core

# 2. 模拟流水线运行
cd core
npm run test:unit              # 运行单元测试
npm run test:acceptance        # 运行验收测试
npm run build                  # 构建项目
npm run lint                   # 代码检查

# 3. 本地模拟 vsce 打包
cd vscode-extension
npx vsce package --dry-run     # 模拟打包

# 4. 验证配置文件语法
yamllint .github/workflows/
```

### 5.2 流水线触发方式

| 触发方式 | 触发条件 | 执行内容 |
|---------|---------|---------|
| 自动触发 | 推送代码至 main/develop/release/* | 根据分支执行对应流程 |
| 标签触发 | git tag v* | 完整构建 + 生产发布 |
| 手动触发 | workflow_dispatch | 自定义参数执行 |
| 定时触发 | schedule (每周日) | 完整验收测试 |

### 5.3 分支管理规范

```
main          ─────────────────────────────────────────►
              ↑                    ↑                    ↑
develop       ───────► (合并) ───────► (合并) ─────────►
              ↑        ↑          ↑        ↑
feature/*     ─► 完成 ─┘    完成 ─┘
              ↑
hotfix/*      ───────► 紧急修复 ─────────► (合并)
```

| 分支类型 | 命名规范 | 生命周期 | 合并目标 |
|---------|---------|---------|---------|
| main | main | 永久 | - |
| develop | develop | 永久 | main |
| feature | feature/* | 1-4 周 | develop |
| release | release/v*.*.* | 2-4 周 | main + develop |
| hotfix | hotfix/* | 1-7 天 | main + develop |

### 5.4 环境变量配置

在 GitHub 仓库 Settings > Secrets and variables 中配置以下密钥：

| 密钥名称 | 用途说明 | 必需性 |
|---------|---------|-------|
| GH_TOKEN | GitHub 认证令牌 | 必需 |
| VSCE_PAT | VS Code 市场发布令牌 | 发布必需 |
| JETBRAINS_TOKEN | JetBrains 市场发布令牌 | 发布必需 |
| SLACK_WEBHOOK_URL | Slack 通知 Webhook | 推荐 |
| NPM_TOKEN | NPM 仓库认证令牌 | 可选 |
| AWS_ACCESS_KEY_ID | S3 存储访问密钥 | 可选 |

