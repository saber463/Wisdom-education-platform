name: CI - 所有模块测试

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.10'
  RUST_VERSION: '1.70'

jobs:
  # 后端测试
  backend-test:
    name: 后端测试 (Node.js/TypeScript)
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: edu_education_platform_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      
      redis:
        image: redis:6-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: 安装后端依赖
        working-directory: ./backend
        run: npm ci
      
      - name: 安装 MySQL 客户端并初始化测试库
        run: |
          sudo apt-get update -qq && sudo apt-get install -y default-mysql-client
          for i in $(seq 1 30); do mysql -h 127.0.0.1 -P 3306 -u root -ptest_password -e "SELECT 1" 2>/dev/null && break; sleep 2; done
          sed 's/edu_education_platform/edu_education_platform_test/g' backend/sql/learning-platform-integration-tables.sql | mysql -h 127.0.0.1 -P 3306 -u root -ptest_password
      
      - name: 运行 ESLint
        working-directory: ./backend
        run: npm run lint || true
      
      - name: 运行快速测试
        working-directory: ./backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: test_password
          DB_NAME: edu_education_platform_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_key
        run: npm run test:fast
      
      - name: 构建后端
        working-directory: ./backend
        run: npm run build
      
      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/coverage
          retention-days: 7
          if-no-files-found: ignore

  # 前端测试
  frontend-test:
    name: 前端测试 (Vue3/TypeScript)
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: 安装前端依赖
        working-directory: ./frontend
        run: npm ci
      
      - name: 运行 ESLint
        working-directory: ./frontend
        run: npm run lint || true
      
      - name: 运行前端测试
        working-directory: ./frontend
        run: npm run test
      
      - name: 构建前端
        working-directory: ./frontend
        run: npm run build:ci
      
      - name: 上传构建产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7
      
      - name: 上传测试覆盖率
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 7
          if-no-files-found: ignore

  # Python AI 服务测试
  python-ai-test:
    name: Python AI 服务测试
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: python-ai/requirements.txt
      
      - name: 安装 Python 依赖
        working-directory: ./python-ai
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 运行 Python 测试
        working-directory: ./python-ai
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short || echo "测试失败或未配置"
          else
            echo "测试目录不存在，跳过测试"
          fi
      
      - name: 检查 Python 代码质量
        working-directory: ./python-ai
        run: |
          pip install flake8 || true
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

  # Rust 服务测试
  rust-service-test:
    name: Rust 服务测试
    runs-on: ubuntu-latest
    continue-on-error: true  # Rust服务是可选的
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust-service/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-service/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: 运行 Rust 测试
        working-directory: ./rust-service
        run: |
          cargo test --release --verbose || echo "Rust测试失败或未配置"
      
      - name: 构建 Rust 服务
        working-directory: ./rust-service
        run: |
          cargo build --release || echo "Rust构建失败或未配置"

  # 综合测试报告
  test-summary:
    name: 测试总结
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, python-ai-test, rust-service-test]
    if: always()
    
    steps:
      - name: 汇总测试结果
        run: |
          echo "## 测试结果汇总" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 模块 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 后端 (Node.js) | ${{ needs.backend-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 前端 (Vue3) | ${{ needs.frontend-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python AI | ${{ needs.python-ai-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust 服务 | ${{ needs.rust-service-test.result }} |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.backend-test.result }}" != "success" ] || \
             [ "${{ needs.frontend-test.result }}" != "success" ]; then
            echo "❌ 核心模块测试失败，请检查！"
            exit 1
          else
            echo "✅ 核心模块测试通过！"
          fi

