## 四、异常处理

### 4.1 构建失败告警

流水线配置了多层告警机制，确保构建问题能够及时发现和处理：

| 告警级别 | 触发条件 | 通知渠道 | 响应时间 |
|---------|---------|---------|---------|
| P0 - 紧急 | 主流程失败、测试全部失败 | Slack + 短信 + 邮件 | 5 分钟内 |
| P1 - 高 | 单个关键任务失败 | Slack + 邮件 | 30 分钟内 |
| P2 - 中 | 测试覆盖率下降 | Slack | 2 小时内 |
| P3 - 低 | 警告信息累积 | 每日汇总邮件 | 24 小时内 |

### 4.2 回滚机制

```yaml
# .github/workflows/rollback.yml
name: 回滚操作

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: '目标回滚版本号'
        required: true
      reason:
        description: '回滚原因'
        required: true

jobs:
  rollback:
    name: 执行回滚
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://error-cn.example.com
    steps:
      - name: 确认回滚
        run: |
          echo "确认回滚到版本: ${{ github.event.inputs.target_version }}"
          echo "回滚原因: ${{ github.event.inputs.reason }}"
          read -p "确认执行回滚? (y/n) " -n 1 -r
          echo
          if [[ ! $REPLY =~ ^[Yy]$ ]]; then
            exit 1
          fi

      - name: 回滚 Git 标签
        run: |
          git checkout main
          git pull
          git tag -d "v${{ github.event.inputs.target_version }}" 2>/dev/null || true
          git push origin --delete "v${{ github.event.inputs.target_version }}" 2>/dev/null || true

      - name: 回滚插件市场
        run: |
          echo "从 ${{ github.event.inputs.target_version }} 恢复插件..."
          # 调用市场 API 回滚版本
          curl -X POST "https://api.vscode.com/rollback" \
            -H "Authorization: Bearer ${{ secrets.VSCE_PAT }}" \
            -d '{"version": "${{ github.event.inputs.target_version }}"}'

      - name: 通知回滚结果
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "ErrorCN 回滚通知",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *回滚成功*\n> 版本: ${{ github.event.inputs.target_version }}\n> 原因: ${{ github.event.inputs.reason }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
```

### 4.3 日志收集

流水线自动收集并归档以下日志：

| 日志类型 | 收集位置 | 保留时间 | 存储方式 |
|---------|---------|---------|---------|
| 构建日志 | workflow 运行日志 | 90 天 | GitHub Artifacts |
| 测试报告 | core/reports/ | 180 天 | GitHub Artifacts |
| 性能数据 | core/reports/perf/ | 365 天 | S3 存储 |
| 部署记录 | deployments/ | 永久 | 数据库 |

