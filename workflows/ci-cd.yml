# ErrorCN CI/CD 自动化流水线配置

**版本**：v1.0.0  
**日期**：2026年2月1日  
**技术栈**：GitHub Actions、Node.js、Java、Inno Setup

---

## 一、流水线概述

### 1.1 流水线目标

本流水线旨在为 ErrorCN 多语言报错插件提供完整的持续集成与持续部署解决方案，实现从代码提交到插件发布的全流程自动化。流水线覆盖代码质量检查、自动化测试、插件打包、多环境部署、版本管理等关键环节，确保插件在各个阶段的质量可控、发布流程规范化。通过本流水线，开发团队可以专注于代码开发，而部署和发布工作则由自动化流程完成，大幅提升开发效率和发布可靠性。

流水线设计遵循以下核心原则：
1. **质量门禁**：每个阶段设置质量关卡，不通过则阻断后续流程
2. **快速反馈**：自动化测试在 5 分钟内完成，提供即时质量反馈
3. **安全发布**：生产环境发布需手动确认，支持一键回滚
4. **多端同步**：VS Code 和 PyCharm 插件同步发布

### 1.2 适用场景

本流水线适用于以下开发场景：

| 场景类型 | 触发条件 | 执行内容 |
|---------|---------|---------|
| 特性开发 | 推送至 feature/* 分支 | 代码检查、单元测试、预览构建 |
| 测试验证 | 推送至 develop 分支 | 完整测试、预览打包、测试环境部署 |
| 正式发布 | 推送至 release/* 分支或打标签 | 完整构建、生产打包、正式发布 |
| 快速修复 | 推送 hotfix/* 分支 | 加速测试、紧急打包、热修复发布 |

### 1.3 技术架构

流水线采用 GitHub Actions 作为核心调度引擎，配合多种构建工具实现多平台插件打包：

```
┌─────────────────────────────────────────────────────────────────────┐
│                         GitHub Actions                               │
│  ┌──────────┐  ┌──────────┐  ┌──────────┐  ┌──────────┐            │
│  │ Checkout │→│ Install  │→│  Lint    │→│  Build   │            │
│  └──────────┘  └──────────┘  └──────────┘  └──────────┘            │
│       ↓                                                    ↓         │
│  ┌──────────┐  ┌──────────┐  ┌──────────┐  ┌──────────┐            │
│  │  Test    │→│ Package  │→│ Deploy   │→│ Release  │            │
│  └──────────┘  └──────────┘  └──────────┘  └──────────┘            │
└─────────────────────────────────────────────────────────────────────┘
       ↓               ↓               ↓               ↓
  ┌─────────┐    ┌─────────┐    ┌─────────┐    ┌─────────┐
  │ Node.js │    │  vsce   │    │ S3/GCS  │    │ GitHub  │
  │ Jest    │    │ Gradle  │    │ Upload  │    │ Releases│
  │ ESLint  │    │ Inno    │    │         │    │ Market  │
  └─────────┘    └─────────┘    └─────────┘    └─────────┘
```

**核心技术栈**：

| 技术组件 | 用途说明 | 版本要求 |
|---------|---------|---------|
| Node.js | Core 模块构建环境 | v20.10.0 LTS |
| TypeScript | 核心代码编写与编译 | v5.3.3 |
| Java | PyCharm 插件构建 | v17 LTS |
| Gradle | PyCharm 插件打包 | v8.5+ |
| vsce | VS Code 插件打包与发布 | latest |
| GitHub Actions | 流水线调度 | - |
| Inno Setup | Windows 安装包制作 | 6.2+ |

