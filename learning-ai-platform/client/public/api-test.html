<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API连接测试</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <h1>API连接测试</h1>
    <button onclick="testNotifications()">测试通知API</button>
    <button onclick="testUserData()">测试用户数据API</button>
    <button onclick="testTweets()">测试推文API</button>
    <div id="result" style="margin-top: 20px; padding: 10px; background: #f5f5f5"></div>

    <script>
      // 从localStorage获取token
      const token = localStorage.getItem('learning-ai-platform_token');

      if (!token) {
        document.getElementById('result').innerHTML =
          '<p style="color: red;">未找到认证token，请先登录系统</p>';
      } else {
        document.getElementById('result').innerHTML = '<p>找到认证token，可以进行测试</p>';
      }

      async function testNotifications() {
        try {
          document.getElementById('result').innerHTML = '<p>正在测试通知API...</p>';
          const response = await axios.get('/api/notifications', {
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });
          document.getElementById('result').innerHTML =
            `<pre style="white-space: pre-wrap;">成功: ${JSON.stringify(response.data, null, 2)}</pre>`;
        } catch (error) {
          document.getElementById('result').innerHTML =
            `<pre style="white-space: pre-wrap; color: red;">错误: ${JSON.stringify(error.response?.data || error.message, null, 2)}</pre>`;
        }
      }

      async function testUserData() {
        try {
          document.getElementById('result').innerHTML = '<p>正在测试用户数据API...</p>';
          const response = await axios.get('/api/users/info', {
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });
          document.getElementById('result').innerHTML =
            `<pre style="white-space: pre-wrap;">成功: ${JSON.stringify(response.data, null, 2)}</pre>`;
        } catch (error) {
          document.getElementById('result').innerHTML =
            `<pre style="white-space: pre-wrap; color: red;">错误: ${JSON.stringify(error.response?.data || error.message, null, 2)}</pre>`;
        }
      }

      async function testTweets() {
        try {
          document.getElementById('result').innerHTML = '<p>正在测试推文API...</p>';
          const response = await axios.get('/api/tweets', {
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });
          document.getElementById('result').innerHTML =
            `<pre style="white-space: pre-wrap;">成功: ${JSON.stringify(response.data, null, 2)}</pre>`;
        } catch (error) {
          document.getElementById('result').innerHTML =
            `<pre style="white-space: pre-wrap; color: red;">错误: ${JSON.stringify(error.response?.data || error.message, null, 2)}</pre>`;
        }
      }
    </script>
  </body>
</html>
