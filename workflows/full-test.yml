name: Full Test Suite

on:
  workflow_dispatch:
    inputs:
      run_core:
        description: 'Run Core tests'
        required: false
        default: 'true'
        type: boolean
      run_vscode:
        description: 'Run VSCode tests'
        required: false
        default: 'true'
        type: boolean
      run_idea:
        description: 'Run IDEA tests'
        required: false
        default: 'false'
        type: boolean
      run_pycharm:
        description: 'Run PyCharm tests'
        required: false
        default: 'false'
        type: boolean
      node_version:
        description: 'Node.js version'
        required: false
        default: '20'
      scheduled:
        description: 'Scheduled run'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  # Core 模块测试
  test-core:
    name: Test Core Module
    runs-on: ubuntu-latest
    if: inputs.run_core == 'true' || inputs.scheduled == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version || env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: core/package-lock.json

      - name: Install dependencies
        run: |
          cd core
          npm ci

      - name: Run tests
        run: |
          cd core
          npm run test:unit -- --coverage --forceExit

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          directory: ./core/coverage/
          fail_ci_if_error: false

      - name: Run integration tests
        run: |
          cd core
          npm run test:integration || true
        continue-on-error: true

  # VSCode 插件测试
  test-vscode:
    name: Test VSCode Plugin
    runs-on: ubuntu-latest
    if: inputs.run_vscode == 'true' || inputs.scheduled == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: vscode/package-lock.json

      - name: Install dependencies
        run: |
          cd vscode
          npm install

      - name: Compile TypeScript
        run: |
          cd vscode
          npm run compile

      - name: Run ESLint
        run: |
          cd vscode
          npm run lint || true
        continue-on-error: true

  # IDEA 插件测试
  test-idea:
    name: Test IDEA Plugin
    runs-on: ubuntu-latest
    if: inputs.run_idea == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build IDEA plugin
        working-directory: ./idea
        run: |
          ../gradlew buildPlugin

      - name: Run IDEA tests
        working-directory: ./idea
        run: |
          ../gradlew test || true
        continue-on-error: true

  # PyCharm 插件测试
  test-pycharm:
    name: Test PyCharm Plugin
    runs-on: ubuntu-latest
    if: inputs.run_pycharm == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build PyCharm plugin
        working-directory: ./pycharm
        run: |
          ../gradlew buildPlugin

      - name: Run PyCharm tests
        working-directory: ./pycharm
        run: |
          ../gradlew test || true
        continue-on-error: true

  # 测试汇总
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-core, test-vscode, test-idea, test-pycharm]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Core | ${{ needs.test-core.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| VSCode | ${{ needs.test-vscode.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IDEA | ${{ needs.test-idea.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PyCharm | ${{ needs.test-pycharm.result }} |" >> $GITHUB_STEP_SUMMARY
